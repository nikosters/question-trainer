name: Nightly Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Write signing properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare artifact
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          NIGHTLY_VERSION="nightly.$(date -u +%Y%m%d).${SHORT_SHA}"
          echo "NIGHTLY_VERSION=$NIGHTLY_VERSION" >> "$GITHUB_ENV"
          cp build/app/outputs/flutter-apk/app-release.apk "question-trainer-${NIGHTLY_VERSION}-android-universal.apk"

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: nightly
          RELEASE_TITLE: Тренажёр заданий nightly
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          ARTIFACT="question-trainer-${NIGHTLY_VERSION}-android-universal.apk"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          NOTES="$(mktemp)"
          {
            echo "Nightly Android APK."
            echo
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Build: ${NIGHTLY_VERSION}"
            echo "- Commit: ${SHORT_SHA}"
            echo "- Workflow run: ${RUN_URL}"
          } > "$NOTES"

          git tag --force "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/${RELEASE_TAG}"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES" \
              --prerelease
            gh release upload "$RELEASE_TAG" "$ARTIFACT"
          else
            gh release create "$RELEASE_TAG" "$ARTIFACT" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES" \
              --prerelease
          fi
